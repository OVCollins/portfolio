<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collins Victory Odabi — Media & Communications</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0D1117;
      --cream:   #F0EDE6;
      --amber:   #E8A020;
      --amber-d: #C4860E;
      --slate:   #5C6B7A;
      --white:   #FFFFFF;
      --mid:     #1C2430;
      --border:  rgba(240,237,230,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── SCROLL ANIMATIONS ── */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-left {
      opacity: 0;
      transform: translateX(-50px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal-left.visible { opacity: 1; transform: none; }
    .reveal-right {
      opacity: 0;
      transform: translateX(50px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal-right.visible { opacity: 1; transform: none; }
    .stagger-child {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .stagger-child.visible { opacity: 1; transform: none; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.1rem 4rem;
      background: rgba(13,17,23,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      transition: padding 0.3s ease, background 0.3s ease;
    }
    nav.scrolled { padding: 0.75rem 4rem; background: rgba(13,17,23,0.97); }
    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--amber);
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-logo:hover { opacity: 0.75; }
    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
    .nav-links a {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate);
      text-decoration: none;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute; bottom: -3px; left: 0; right: 0;
      height: 1px; background: var(--amber);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.25s ease;
    }
    .nav-links a:hover { color: var(--cream); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-home-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--amber);
      color: var(--ink) !important;
      text-decoration: none;
      padding: 0.45rem 1rem;
      font-weight: 700;
      transition: background 0.2s, transform 0.15s;
      display: inline-block;
    }
    .nav-home-btn:hover { background: var(--amber-d) !important; transform: translateY(-1px); }
    .nav-home-btn::after { display: none !important; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 9rem 4rem 5rem;
      position: relative;
      overflow: hidden;
      gap: 2rem;
    }
    .hero-content { position: relative; z-index: 2; }
    .hero-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 4.5vw, 4.2rem);
      font-weight: 900;
      line-height: 1.08;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-headline em { font-style: italic; color: var(--amber); }
    .hero-sub {
      font-size: 1rem;
      color: var(--slate);
      max-width: 480px;
      line-height: 1.8;
      margin-bottom: 3rem;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.9s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-cta {
      display: flex; gap: 1rem; flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.9s 0.65s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    /* Photo column */
    .hero-photo-col {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
      z-index: 2;
      height: 100%;
      padding-top: 4rem;
      opacity: 0;
      animation: fadeLeft 1s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-photo-frame {
      position: relative;
      width: 100%;
      max-width: 420px;
    }
    .hero-photo-frame::before {
      content: '';
      position: absolute;
      top: -16px; right: -16px;
      width: 100%; height: 100%;
      border: 2px solid var(--amber);
      opacity: 0.35;
      pointer-events: none;
    }
    .hero-photo-frame::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to top, var(--ink) 0%, transparent 100%);
      pointer-events: none;
    }
    .hero-photo {
      width: 100%;
      display: block;
      object-fit: cover;
      object-position: top center;
      filter: grayscale(15%) contrast(1.05);
      transition: filter 0.4s ease;
    }
    .hero-photo:hover { filter: grayscale(0%) contrast(1.08); }

    /* SIGNAL WAVE */
    .signal-canvas {
      position: absolute;
      left: 0; bottom: 0;
      width: 100%; height: 100%;
      opacity: 0.12;
      pointer-events: none;
    }
    .hero-parallax { will-change: transform; }

    /* ── BUTTONS ── */
    .btn-primary {
      display: inline-block;
      background: var(--amber);
      color: var(--ink);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 2rem;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover { background: var(--amber-d); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,160,32,0.25); }
    .btn-ghost {
      display: inline-block;
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 2rem;
      transition: border-color 0.2s, color 0.2s, transform 0.15s;
    }
    .btn-ghost:hover { border-color: var(--cream); transform: translateY(-2px); }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes pulse-amber {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,160,32,0.3); }
      50%       { box-shadow: 0 0 0 12px rgba(232,160,32,0); }
    }

    /* ── SECTION SHELL ── */
    section { padding: 6rem 4rem; }
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 1rem;
      display: block;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.4rem;
    }
    .divider {
      width: 48px; height: 2px;
      background: var(--amber);
      margin-bottom: 3rem;
      transition: width 0.4s ease;
    }
    section:hover .divider { width: 72px; }

    /* ── ABOUT ── */
    .about { background: var(--cream); color: var(--ink); }
    .about .section-title { color: var(--ink); }
    .about .section-label { color: var(--amber-d); }
    .about .divider { background: var(--amber-d); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
    .about-body p { font-size: 1.05rem; color: #2A3340; line-height: 1.8; margin-bottom: 1.2rem; }
    .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .stat-card {
      background: var(--ink); color: var(--cream);
      padding: 1.6rem; border-left: 3px solid var(--amber);
      transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: default;
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
    .stat-num {
      font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 900;
      color: var(--amber); line-height: 1; display: block; margin-bottom: 0.3rem;
    }
    .stat-label {
      font-family: 'Space Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate);
    }

    /* ── PODCASTS ── */
    .podcasts { background: var(--mid); }
    .podcast-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; }
    .podcast-card {
      background: var(--ink); padding: 2.4rem;
      transition: background 0.25s, transform 0.3s ease, box-shadow 0.3s ease;
      position: relative; overflow: hidden;
    }
    .podcast-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--amber); transform: scaleX(0); transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .podcast-card:hover { background: #141B25; transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
    .podcast-card:hover::before { transform: scaleX(1); }
    .podcast-tag {
      font-family: 'Space Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--amber);
      margin-bottom: 1rem; display: block;
    }
    .podcast-name { font-family: 'Playfair Display', serif; font-size: 1.45rem; font-weight: 700; line-height: 1.25; margin-bottom: 1rem; }
    .podcast-desc { font-size: 0.9rem; color: var(--slate); line-height: 1.7; margin-bottom: 1.6rem; }
    .podcast-meta {
      font-family: 'Space Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.1em; color: #3A4A5A;
      border-top: 1px solid var(--border); padding-top: 1.2rem; line-height: 1.8;
    }

    /* ── JOURNALISM ── */
    .journalism { background: var(--cream); color: var(--ink); }
    .journalism .section-title { color: var(--ink); }
    .journalism .section-label { color: var(--amber-d); }
    .journalism .divider { background: var(--amber-d); }
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .article-card {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-decoration: none;
      color: inherit;
      position: relative;
    }
    .article-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--amber);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .article-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,0,0,0.18); }
    .article-card:hover::after { transform: scaleX(1); }
    .article-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
      background: var(--mid);
    }
    .article-card:hover .article-thumb { transform: scale(1.04); }
    .article-thumb-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: var(--mid);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.5rem;
    }
    .article-thumb-placeholder span:first-child { font-size: 2rem; opacity: 0.3; }
    .article-thumb-placeholder span:last-child {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--slate);
      opacity: 0.6;
    }
    .article-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
    .article-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--amber-d);
      margin-bottom: 0.6rem;
    }
    .article-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--cream); line-height: 1.35;
      margin-bottom: 0.8rem;
    }
    .article-desc {
      font-size: 0.84rem; color: var(--slate);
      line-height: 1.65; flex: 1; margin-bottom: 1.2rem;
    }
    .article-read {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--amber);
      display: flex; align-items: center; gap: 0.4rem;
      transition: gap 0.2s ease;
    }
    .article-card:hover .article-read { gap: 0.7rem; }
    .article-read-arrow { font-size: 0.85rem; }
    .journalism-cta { text-align: center; }

    /* ── EXPERTISE ── */
    .expertise { background: var(--ink); color: var(--cream); }
    .expertise .section-title { color: var(--cream); }
    .expertise .section-label { color: var(--amber); }
    .skills-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #1A2230; }
    .skill-cell {
      background: var(--ink); padding: 2rem 1.6rem;
      transition: background 0.25s, transform 0.25s;
    }
    .skill-cell:hover { background: #141B25; transform: translateY(-2px); }
    .skill-icon { font-size: 1.4rem; margin-bottom: 0.8rem; display: block; }
    .skill-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1rem; color: var(--cream); margin-bottom: 0.5rem; }
    .skill-detail { font-size: 0.85rem; color: var(--slate); line-height: 1.6; }

    /* ── TOOLS ── */
    .tools { background: var(--mid); }
    .tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    .tool-group {
      background: var(--ink); padding: 1.8rem; border-top: 2px solid var(--amber);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .tool-group:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.35); }
    .tool-group-label {
      font-family: 'Space Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--amber); margin-bottom: 1.2rem;
    }
    .tool-list { list-style: none; display: flex; flex-direction: column; gap: 0.9rem; }
    .tool-list li { font-size: 0.92rem; font-weight: 500; color: var(--cream); line-height: 1.3; }
    .tool-sub { display: block; font-size: 0.75rem; font-weight: 300; color: var(--slate); margin-top: 0.15rem; }

    /* ── DESIGN WORK ── */
    .design-work { background: var(--ink); }
    .slideshow-wrap { position: relative; overflow: hidden; margin-bottom: 2rem; }
    .slideshow { display: flex; transition: transform 0.7s cubic-bezier(0.16,1,0.3,1); }
    .slide {
      min-width: 100%; position: relative; overflow: hidden;
      background: var(--mid); aspect-ratio: 16/9; cursor: pointer;
    }
    .slide img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .slide:hover img { transform: scale(1.04); }
    .slide-placeholder {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      color: var(--slate); background: var(--mid);
      border: 1px dashed rgba(240,237,230,0.15);
    }
    .slide-placeholder-icon { font-size: 2.5rem; opacity: 0.4; }
    .slide-placeholder-text {
      font-family: 'Space Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; text-align: center;
    }
    .slide-placeholder-path {
      font-family: 'Space Mono', monospace; font-size: 0.6rem;
      color: var(--amber); opacity: 0.7; text-align: center;
    }
    .slideshow-controls {
      display: flex; align-items: center; justify-content: center;
      gap: 1.5rem; margin-bottom: 2rem;
    }
    .slide-btn {
      background: none; border: 1px solid var(--border);
      color: var(--cream); cursor: pointer;
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .slide-btn:hover { border-color: var(--amber); background: rgba(232,160,32,0.08); transform: scale(1.05); }
    .slide-dots { display: flex; gap: 0.5rem; }
    .slide-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--slate); cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }
    .slide-dot.active { background: var(--amber); transform: scale(1.4); }
    .design-cta { text-align: center; }

    /* ── VIDEO WORK ── */
    .video-work { background: var(--mid); }
    .video-cta-block {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2rem; padding: 4rem;
      border: 1px dashed rgba(232,160,32,0.3); text-align: center;
      position: relative; overflow: hidden;
    }
    .video-cta-block::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(232,160,32,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .video-icon { font-size: 3.5rem; animation: pulse-amber 2.5s ease-in-out infinite; display: inline-block; }
    .video-cta-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
    .video-cta-desc { font-size: 0.95rem; color: var(--slate); max-width: 420px; line-height: 1.7; }

    /* ── ROLES ── */
    .roles { background: var(--ink); }
    .roles-list { display: flex; flex-direction: column; }
    .role-row {
      display: grid; grid-template-columns: 280px 1fr auto;
      gap: 2rem; align-items: baseline; padding: 1.6rem 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s, padding-left 0.2s; cursor: default;
    }
    .role-row:first-child { border-top: 1px solid var(--border); }
    .role-row:hover { background: rgba(240,237,230,0.02); padding-left: 0.5rem; }
    .role-org {
      font-family: 'Space Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber); line-height: 1.5;
    }
    .role-title { font-size: 1rem; font-weight: 500
